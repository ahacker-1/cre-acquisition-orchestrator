name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-v3:
    name: Verify v3 workbench
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            dashboard/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install root dependencies
        run: npm ci

      - name: Install dashboard dependencies
        run: npm --prefix dashboard ci

      - name: Install parser dependencies
        run: npm run setup -- --skip-install --skip-codex-install --skip-login

      - name: Install Playwright browser
        run: npm --prefix dashboard exec playwright install --with-deps chromium

      - name: Run v3 verification gate
        run: npm run verify:v3
