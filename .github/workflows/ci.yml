name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [20]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            dashboard/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install root dependencies
        run: npm ci

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Install Python parser dependencies
        run: python -m pip install -r scripts/requirements.txt

      - name: Validate project structure and agent prompts
        run: node scripts/run-validation.js

      - name: Validate source-backed parser fixtures
        run: npm run test:parsers

      - name: Validate source-backed workspace review/apply flow
        run: npm run test:workspace

      - name: Validate operator guide contract
        run: npm run validate:guides

      - name: Validate checked-in example fixtures
        run: npm run validate:fixtures

      - name: Verify documentation counts
        run: npm run validate:docs

      - name: Run system tests (3 scenarios + failure/resume)
        run: npm test

      - name: Verify dashboard production build
        working-directory: dashboard
        run: npm run build

  e2e:
    name: Dashboard E2E
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            dashboard/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install root dependencies
        run: npm ci

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Install Python parser dependencies
        run: python -m pip install -r scripts/requirements.txt

      - name: Install Playwright browsers
        working-directory: dashboard
        run: npx playwright install --with-deps chromium

      - name: Run dashboard E2E
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            dashboard/playwright-report/
            dashboard/test-results/
          if-no-files-found: ignore
          retention-days: 7
